name: Feature Request
description: Suggest something you'd like to see in the app
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Got an idea? We'd love to hear it. Please search existing requests first to avoid duplicates.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the situation where you felt something was missing.
      placeholder: "I often find myself wanting to..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: What would you like to see?
      description: Describe the feature as clearly as you can.
    validations:
      required: true

  - type: dropdown
    id: device
    attributes:
      label: Device type
      options:
        - iPhone
        - iPad
        - Both
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
      description: Any workarounds you're currently using?

  - type: textarea
    id: context
    attributes:
      label: Anything else?
      description: Screenshots, mockups, or links that might help explain your idea.
